<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ============================== -->
    <!-- 🔥 SEO PRINCIPAL (mis à jour) -->
    <!-- ============================== -->
    <title>
      BlockPulse.be – Contribution Technique ESP32 & Tirages Techniques Bitcoin 🇧🇪
    </title>

    <meta
      name="description"
      content="BlockPulse est un projet technique basé sur un ESP32 connecté à un pool Bitcoin. Participez via des contributions techniques et accédez à des tirages techniques déclenchés automatiquement selon l’activité du pool. Projet expérimental européen."
    />

    <!-- Mots-clés SEO -->
    <meta
      name="keywords"
      content="Bitcoin, ESP32, tirages techniques, contribution technique, ViaBTC, projet expérimental, crypto, microcontrôleur"
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://blockpulse.be/" />

    <!-- ============================== -->
    <!-- 🔍 Robots / Googlebot -->
    <!-- ============================== -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />

    <!-- ============================== -->
    <!-- 📱 PWA / Icons -->
    <!-- ============================== -->
    <link rel="icon" type="image/png" href="/public/favicon.png" />

    <!-- ============================== -->
    <!-- 🟦 OpenGraph (Facebook / Discord) -->
    <!-- ============================== -->
    <meta property="og:title" content="BlockPulse.be – Contribution Technique ESP32 & Tirages Techniques Bitcoin" />
    <meta property="og:description" content="Rejoignez un projet expérimental basé sur un ESP32 connecté à ViaBTC. Participez via des contributions techniques et accédez à des tirages techniques basés sur l’activité du réseau Bitcoin." />
    <meta property="og:image" content="https://blockpulse.be/og-image.png" />
    <meta property="og:url" content="https://blockpulse.be/" />
    <meta property="og:type" content="website" />

    <!-- ============================== -->
    <!-- 🐦 Twitter Card -->
    <!-- ============================== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BlockPulse.be – Contribution Technique ESP32" />
    <meta name="twitter:description" content="Participez à un projet unique basé sur un ESP32 et accédez à des tirages techniques déclenchés automatiquement." />
    <meta name="twitter:image" content="https://blockpulse.be/og-image.png" />

    <!-- ============================== -->
    <!-- 🔧 STRUCTURED DATA JSON-LD -->
    <!-- ============================== -->

    <!-- Organisation -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "BlockPulse",
        "url": "https://blockpulse.be",
        "logo": "https://blockpulse.be/logo.png",
        "description": "Projet expérimental basé sur un ESP32 et des tirages techniques liés au pool Bitcoin ViaBTC."
      }
    </script>

    <!-- Produit / Service -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Service",
        "name": "Contribution Technique BlockPulse",
        "provider": {
          "@type": "Organization",
          "name": "BlockPulse"
        },
        "description": "Participation via des contributions techniques donnant accès à des tirages techniques déclenchés automatiquement.",
        "offers": {
          "@type": "Offer",
          "url": "https://blockpulse.be/participer",
          "priceCurrency": "EUR",
          "price": "5.97",
          "availability": "https://schema.org/InStock"
        }
      }
    </script>

    <!-- ============================== -->
    <!-- 📦 Script Vite -->
    <!-- ============================== -->
    <script type="module" crossorigin src="/src/main.jsx"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="/src/styles.css" />
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
