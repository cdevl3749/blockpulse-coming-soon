[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# === NE PAS mettre de redirects vers /.netlify/functions ===
# Netlify gère automatiquement les endpoints:
# /.netlify/functions/name

# Règle SPA (doit être en dernier)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200



