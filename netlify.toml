[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Autoriser la fonction save-order
[[redirects]]
  from = "/.netlify/functions/save-order"
  to = "/.netlify/functions/save-order"
  status = 200
  force = true

# Autoriser la fonction status (ESP32)
[[redirects]]
  from = "/.netlify/functions/status"
  to = "/.netlify/functions/status"
  status = 200
  force = true

# Redirections anciennes URLs (SEO)
[[redirects]]
  from = "/temps-reel"
  to = "/tools/bitcoin-actif"
  status = 301
  force = true

[[redirects]]
  from = "/comment-ca-marche"
  to = "/"
  status = 301
  force = true

# Règle SPA (à laisser en dernier !)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
