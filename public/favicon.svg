<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Gradient de fond -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffc8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b8cff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#00ffc8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond circulaire -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)"/>
  
  <!-- Symbole # stylisé avec effet de pulse -->
  <g transform="translate(32, 32)">
    <!-- Lignes horizontales -->
    <rect x="-16" y="-8" width="32" height="4" rx="2" fill="url(#pulseGrad)"/>
    <rect x="-16" y="4" width="32" height="4" rx="2" fill="url(#pulseGrad)"/>
    
    <!-- Lignes verticales -->
    <rect x="-8" y="-16" width="4" height="32" rx="2" fill="url(#pulseGrad)"/>
    <rect x="4" y="-16" width="4" height="32" rx="2" fill="url(#pulseGrad)"/>
  </g>
  
  <!-- Effet de brillance -->
  <circle cx="22" cy="22" r="8" fill="white" opacity="0.15"/>
</svg>